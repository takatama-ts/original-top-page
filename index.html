<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>▸ TAMA PORTAL</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:  #1258c8;
    --accent2: #0099cc;
    --text:    #08172e;
    --label:   #4a70a0;
    --dim:     #90aac4;
    --panel:   rgba(255, 255, 255, 0.9);
    --pborder: #90b8de;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse at 50% 38%, #ffffff 0%, #eaf2fb 52%, #d4e8f6 100%);
    color: var(--text);
    font-family: 'Menlo','Monaco','Consolas','Courier New',
                 'Hiragino Kaku Gothic ProN','ヒラギノ角ゴ ProN',
                 'メイリオ', Meiryo, monospace;
  }

  #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .hud {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 26px; padding: 24px;
  }

  /* ── Clock ── */
  .clock {
    position: fixed; top: 22px; right: 28px;
    text-align: right; line-height: 1.8; pointer-events: none;
  }
  #clock-time {
    font-size: 0.75rem; letter-spacing: 0.22em;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }
  #clock-date { font-size: 0.58rem; letter-spacing: 0.22em; color: var(--dim); }

  /* ── Main panel ── */
  .name-frame {
    position: relative;
    padding: 36px clamp(36px, 7vw, 84px) 28px;
    text-align: center;
    min-width: min(460px, 90vw);
    background: var(--panel);
    border: 1px solid var(--pborder);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow:
      0 6px 32px rgba(14, 52, 110, 0.10),
      0 1px 4px rgba(14, 52, 110, 0.07),
      inset 0 1px 0 rgba(255, 255, 255, 1);
    overflow: hidden;
  }

  /* SAO corner brackets */
  .c-tl,.c-tr,.c-bl,.c-br {
    position: absolute; width: 20px; height: 20px;
    border-color: var(--accent); border-style: solid;
  }
  .c-tl { top: 0; left: 0;   border-width: 2px 0 0 2px; }
  .c-tr { top: 0; right: 0;  border-width: 2px 2px 0 0; }
  .c-bl { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
  .c-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  /* Extended tick lines from each corner */
  .c-tl::after { content:''; position:absolute; top:-2px; left:20px;  width:28px; height:2px; background:var(--accent); opacity:0.3; }
  .c-tr::after { content:''; position:absolute; top:-2px; right:20px; width:28px; height:2px; background:var(--accent); opacity:0.3; }
  .c-bl::after { content:''; position:absolute; bottom:-2px; left:20px;  width:28px; height:2px; background:var(--accent); opacity:0.3; }
  .c-br::after { content:''; position:absolute; bottom:-2px; right:20px; width:28px; height:2px; background:var(--accent); opacity:0.3; }

  .sys-label {
    font-size: 0.6rem; letter-spacing: 0.42em;
    color: var(--label); margin-bottom: 16px; text-transform: uppercase;
  }

  #name-wrap {
    display: flex; align-items: center; justify-content: center;
    min-height: clamp(3rem, 9vw, 5.5rem);
  }

  #name-text {
    font-size: clamp(2.4rem, 7.5vw, 5rem);
    font-weight: 700; letter-spacing: 0.05em; line-height: 1;
  }

  #cursor {
    display: inline-block; width: 3px;
    height: clamp(2rem, 6vw, 4rem);
    margin-left: 5px; vertical-align: middle; flex-shrink: 0;
    background: var(--accent);
    animation: blink 0.75s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* divider row below name */
  .frame-status {
    margin-top: 14px;
    display: flex; align-items: center; gap: 10px;
    font-size: 0.55rem; letter-spacing: 0.4em; color: var(--dim); text-transform: uppercase;
  }
  .frame-status span { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--dim) 70%); opacity: 0.45; }
  .frame-status span:last-child { background: linear-gradient(90deg, var(--dim) 30%, transparent); }

  /* ── Links ── */
  .links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  .lbtn {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 20px;
    text-decoration: none; color: var(--text);
    font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
    border: 1px solid;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 2px 8px rgba(14,52,110,0.07);
    transition: box-shadow 0.25s, background 0.25s;
  }
  .lbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .lbtn svg { width: 14px; height: 14px; flex-shrink: 0; }

  .lbtn-gh  { border-color: rgba(10,150,72,0.40); }
  .lbtn-gh  svg { color: #0a9648; }
  .lbtn-gh:hover  { background: rgba(10,150,72,0.06); box-shadow: 0 4px 18px rgba(10,150,72,0.18); }

  .lbtn-qi  { border-color: rgba(0,120,175,0.40); }
  .lbtn-qi  svg { color: #0078af; }
  .lbtn-qi:hover  { background: rgba(0,120,175,0.06); box-shadow: 0 4px 18px rgba(0,120,175,0.18); }

  .lbtn-pt  { border-color: rgba(185,0,90,0.40); }
  .lbtn-pt  svg { color: #b9005a; }
  .lbtn-pt:hover  { background: rgba(185,0,90,0.06); box-shadow: 0 4px 18px rgba(185,0,90,0.18); }

  /* ── Interest tags ── */
  .interests {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center; max-width: 520px;
  }

  .tag {
    padding: 5px 12px;
    font-size: 0.67rem; letter-spacing: 0.1em;
    border: 1px solid; border-radius: 1px;
    background: rgba(255, 255, 255, 0.72);
    opacity: 0.78;
    animation: floatTag var(--d) ease-in-out var(--dl) infinite alternate;
    transition: opacity 0.2s, box-shadow 0.2s;
  }
  .tag:hover { opacity: 1; box-shadow: 0 3px 12px rgba(0,0,0,0.09); }
  @keyframes floatTag { from{transform:translateY(0)} to{transform:translateY(-4px)} }

  /* ── Footer ── */
  .footer {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    font-size: 0.54rem; letter-spacing: 0.35em;
    color: var(--dim); opacity: 0.45; white-space: nowrap; pointer-events: none;
  }

  @media (prefers-reduced-motion: reduce) {
    .tag { animation: none; }
    #cursor { animation: none; }
  }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="hud">

  <div class="clock" aria-live="polite" aria-atomic="true">
    <div id="clock-time">00:00:00</div>
    <div id="clock-date">----.--.--</div>
  </div>

  <div class="name-frame" role="heading" aria-level="1" aria-label="User identity">
    <div class="c-tl"></div><div class="c-tr"></div>
    <div class="c-bl"></div><div class="c-br"></div>
    <div class="sys-label">◈ USER IDENTITY</div>
    <div id="name-wrap">
      <span id="name-text" aria-live="polite" aria-atomic="true"></span>
      <span id="cursor" aria-hidden="true"></span>
    </div>
    <div class="frame-status"><span></span>ACCESS GRANTED<span></span></div>
  </div>

  <nav class="links" aria-label="Profile links">
    <a class="lbtn lbtn-gh" href="https://github.com/kohki-takatama" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.49
                 .5.09.682-.218.682-.482 0-.237-.009-.868-.014-1.703
                 -2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462
                 -.908-.62.069-.608.069-.608 1.004.07 1.532 1.032 1.532 1.032
                 .892 1.53 2.341 1.088 2.91.832.091-.647.35-1.088.636-1.338
                 -2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683
                 -.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025
                 A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337
                 c1.909-1.294 2.748-1.025 2.748-1.025.546 1.377.202 2.394.1 2.647
                 .64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935
                 .359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743
                 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12
                 c0-5.523-4.477-10-10-10z"/>
      </svg>
      GitHub
    </a>
    <a class="lbtn lbtn-qi" href="https://qiita.com/kohki_takatama" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 8v4l2.5 2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Qiita
    </a>
    <a class="lbtn lbtn-pt" href="https://potofu.me/kohki-takatama" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke-linecap="round"/>
      </svg>
      Potofu
    </a>
  </nav>

  <div class="interests" role="list" aria-label="Interests"></div>

</div>

<div class="footer">SYSTEM ONLINE ──── ACCESS GRANTED</div>

<script>
(function () {
  'use strict';

  var NAMES = ['Tama','Erlei','たま','Kohki_Takatama','かめれおん','MaoWeiyu','雲雀'];

  var NAME_GRADIENTS = [
    ['#1258c8','#00b4d8'],
    ['#8b2de8','#e82d78'],
    ['#e87800','#e8c800'],
    ['#0ea86a','#1258c8'],
    ['#e82d78','#8b2de8'],
    ['#1258c8','#8b2de8'],
    ['#e87800','#0ea86a'],
  ];

  var INTERESTS = [
    { label: 'からくりサーカス', color: '#c8003e' },
    { label: '最終兵器彼女',     color: '#6010c0' },
    { label: '3つの物語',        color: '#0078af' },
    { label: 'プログラミング',   color: '#077a48' },
    { label: '読書',             color: '#b07000' },
    { label: '自然',             color: '#2e7a1a' },
  ];

  var ACCENTS = ['#1258c8','#0099cc','#8b2de8','#d42060','#d46000','#0a9648'];

  // ── Clock
  var clockTime = document.getElementById('clock-time');
  var clockDate = document.getElementById('clock-date');
  function tickClock() {
    var n = new Date(), p = function(v){ return String(v).padStart(2,'0'); };
    clockTime.textContent = p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
    clockDate.textContent = n.getFullYear()+'.'+p(n.getMonth()+1)+'.'+p(n.getDate());
  }
  setInterval(tickClock, 1000); tickClock();

  // ── Interest tags
  var tagsEl = document.querySelector('.interests');
  INTERESTS.forEach(function(item, i) {
    var el = document.createElement('div');
    el.className = 'tag'; el.setAttribute('role','listitem');
    el.textContent = item.label;
    el.style.setProperty('--d', (3.8 + i * 0.45)+'s');
    el.style.setProperty('--dl', (i * 0.28)+'s');
    el.style.borderColor = item.color+'60';
    el.style.color = item.color;
    tagsEl.appendChild(el);
  });

  // ── Name animation
  var nameEl   = document.getElementById('name-text');
  var cursorEl = document.getElementById('cursor');
  var nameIdx  = Math.floor(Math.random() * NAMES.length);

  function applyGradient(idx) {
    var g = NAME_GRADIENTS[idx % NAME_GRADIENTS.length];
    nameEl.style.background = 'linear-gradient(135deg,'+g[0]+','+g[1]+')';
    nameEl.style.webkitBackgroundClip = 'text';
    nameEl.style.backgroundClip = 'text';
    nameEl.style.webkitTextFillColor = 'transparent';
    nameEl.style.color = 'transparent';
    cursorEl.style.background = 'linear-gradient(180deg,'+g[0]+','+g[1]+')';
  }

  function isJapanese(str) { return /[぀-ヿ一-鿿]/.test(str); }

  function glitchPool(str) {
    return isJapanese(str)
      ? 'ヲアイウエオカキクケコサシスセソタチナニハヒフヘホ▓░◈'
      : '▓▒░█▄▀■□◈◊#@$%!?';
  }

  function typeIn(str, done) {
    nameEl.textContent = ''; var i = 0;
    function step() {
      nameEl.textContent = str.slice(0, ++i);
      if (i < str.length) setTimeout(step, 72 + Math.random()*44);
      else setTimeout(done, 2500);
    }
    step();
  }

  function glitchOut(str, done) {
    var pool = glitchPool(str), s = 0, total = 7;
    function scramble() {
      nameEl.textContent = str.split('').map(function(c, i) {
        return s / total > i / str.length ? '' : pool[Math.floor(Math.random()*pool.length)];
      }).join('');
      s++;
      if (s <= total) setTimeout(scramble, 52);
      else { nameEl.textContent = ''; done(); }
    }
    scramble();
  }

  function pickNext() {
    var n; do { n = Math.floor(Math.random()*NAMES.length); } while (n === nameIdx); return n;
  }

  function cycle() {
    applyGradient(nameIdx);
    typeIn(NAMES[nameIdx], function() {
      glitchOut(NAMES[nameIdx], function() {
        nameIdx = pickNext(); setTimeout(cycle, 160);
      });
    });
  }
  cycle();

  // ── Background canvas
  var canvas = document.getElementById('bg');
  var ctx    = canvas.getContext('2d');
  var CONN   = 120;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  var SHAPES = ['circle','hex','diamond'];

  function makeNode(init) {
    return {
      x:     init ? Math.random()*canvas.width  : (Math.random()<.5 ? -24 : canvas.width+24),
      y:     init ? Math.random()*canvas.height : Math.random()*canvas.height,
      vx:    (Math.random()-.5)*0.25,
      vy:    (Math.random()-.5)*0.25,
      r:     3 + Math.random()*5.5,
      color: ACCENTS[Math.floor(Math.random()*ACCENTS.length)],
      shape: SHAPES[Math.floor(Math.random()*SHAPES.length)],
      alpha: 0.18 + Math.random()*0.30,
      angle: Math.random()*Math.PI*2,
      spin:  (Math.random()-.5)*0.007
    };
  }

  var nodes = [];
  for (var i = 0; i < 48; i++) nodes.push(makeNode(true));

  function drawNode(n) {
    ctx.save();
    ctx.translate(n.x, n.y); ctx.rotate(n.angle);
    ctx.globalAlpha = n.alpha;
    ctx.strokeStyle = n.color;
    ctx.fillStyle   = n.color + '18';
    ctx.lineWidth   = 1; ctx.shadowBlur = 0;
    ctx.beginPath();
    if (n.shape === 'circle') {
      ctx.arc(0, 0, n.r, 0, Math.PI*2);
    } else if (n.shape === 'hex') {
      for (var k = 0; k < 6; k++) {
        var a = (k/6)*Math.PI*2 - Math.PI/2;
        ctx[k?'lineTo':'moveTo'](Math.cos(a)*n.r, Math.sin(a)*n.r);
      }
      ctx.closePath();
    } else {
      ctx.moveTo(0,-n.r); ctx.lineTo(n.r,0); ctx.lineTo(0,n.r); ctx.lineTo(-n.r,0); ctx.closePath();
    }
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  function drawLinks() {
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i+1; j < nodes.length; j++) {
        var dx = nodes[i].x-nodes[j].x, dy = nodes[i].y-nodes[j].y;
        var d  = Math.sqrt(dx*dx+dy*dy);
        if (d < CONN) {
          ctx.globalAlpha = (1-d/CONN)*0.18;
          ctx.strokeStyle = '#7090b8';
          ctx.lineWidth   = 0.5; ctx.shadowBlur = 0;
          ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.stroke();
        }
      }
    }
  }

  function drawGrid() {
    ctx.globalAlpha = 0.08; ctx.strokeStyle = '#6890c0'; ctx.lineWidth = 0.5;
    var g = 72;
    for (var x = 0; x <= canvas.width; x+=g) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    }
    for (var y = 0; y <= canvas.height; y+=g) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
    }
  }

  function frame() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawGrid();
    ctx.globalAlpha = 1;
    drawLinks();
    nodes.forEach(function(n) {
      n.x += n.vx; n.y += n.vy; n.angle += n.spin;
      if (n.x<-60||n.x>canvas.width+60||n.y<-60||n.y>canvas.height+60) {
        var f = makeNode(false); Object.assign(n, f);
      }
      drawNode(n);
    });
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>

</body>
</html>
