<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>▸ TAMA PORTAL</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:  #1258c8;
    --accent2: #0099cc;
    --text:    #08172e;
    --label:   #4a70a0;
    --dim:     #90aac4;
    --panel:   rgba(255, 255, 255, 0.9);
    --pborder: #90b8de;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse at 50% 38%, #ffffff 0%, #eaf2fb 52%, #d4e8f6 100%);
    color: var(--text);
    font-family: 'Menlo','Monaco','Consolas','Courier New',
                 'Hiragino Kaku Gothic ProN','ヒラギノ角ゴ ProN',
                 'メイリオ', Meiryo, monospace;
  }

  #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .hud {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 26px; padding: 24px;
  }

  /* ── Clock ── */
  .clock {
    position: fixed; top: 22px; right: 28px;
    text-align: right; line-height: 1.8; pointer-events: none;
  }
  #clock-time {
    font-size: 0.75rem; letter-spacing: 0.22em;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }
  #clock-date { font-size: 0.58rem; letter-spacing: 0.22em; color: var(--dim); }

  /* ── Main panel ── */
  .name-frame {
    position: relative;
    cursor: pointer;
    padding: 36px clamp(36px, 7vw, 84px) 28px;
    text-align: center;
    min-width: min(460px, 90vw);
    background: var(--panel);
    border: 1px solid var(--pborder);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow:
      0 6px 32px rgba(14, 52, 110, 0.10),
      0 1px 4px rgba(14, 52, 110, 0.07),
      inset 0 1px 0 rgba(255, 255, 255, 1);
  }

  /* SAO corner brackets */
  .c-tl,.c-tr,.c-bl,.c-br {
    position: absolute; width: 20px; height: 20px;
    border-color: var(--accent); border-style: solid;
  }
  .c-tl { top: 0; left: 0;   border-width: 2px 0 0 2px; }
  .c-tr { top: 0; right: 0;  border-width: 2px 2px 0 0; }
  .c-bl { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
  .c-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  .c-tl::after { content:''; position:absolute; top:-2px; left:20px;  width:28px; height:2px; background:var(--accent); opacity:0.3; }
  .c-tr::after { content:''; position:absolute; top:-2px; right:20px; width:28px; height:2px; background:var(--accent); opacity:0.3; }
  .c-bl::after { content:''; position:absolute; bottom:-2px; left:20px;  width:28px; height:2px; background:var(--accent); opacity:0.3; }
  .c-br::after { content:''; position:absolute; bottom:-2px; right:20px; width:28px; height:2px; background:var(--accent); opacity:0.3; }

  .sys-label {
    font-size: 0.6rem; letter-spacing: 0.42em;
    color: var(--label); margin-bottom: 16px; text-transform: uppercase;
  }

  #name-wrap {
    display: flex; align-items: center; justify-content: center;
    min-height: clamp(3rem, 9vw, 5.5rem);
  }

  #name-text {
    font-size: clamp(2.4rem, 7.5vw, 5rem);
    font-weight: 700; letter-spacing: 0.05em; line-height: 1;
  }

  #cursor {
    display: inline-block; width: 3px;
    height: clamp(2rem, 6vw, 4rem);
    margin-left: 5px; vertical-align: middle; flex-shrink: 0;
    background: var(--accent);
    animation: blink 0.75s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .frame-status {
    margin-top: 14px;
    display: flex; align-items: center; gap: 10px;
    font-size: 0.55rem; letter-spacing: 0.4em; color: var(--dim); text-transform: uppercase;
  }
  .frame-status span { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--dim) 70%); opacity: 0.45; }
  .frame-status span:last-child { background: linear-gradient(90deg, var(--dim) 30%, transparent); }

  /* ── Links ── */
  .links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  .lbtn {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 20px;
    text-decoration: none; color: var(--text);
    font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
    border: 1px solid rgba(18,88,200,0.4);
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 2px 8px rgba(14,52,110,0.07);
    transition: box-shadow 0.25s, background 0.25s;
  }
  .lbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .lbtn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ── Interest tags ── */
  .identities {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center; max-width: 520px;
  }

  .tag {
    padding: 5px 12px;
    font-size: 0.67rem; letter-spacing: 0.1em;
    border: 1px solid; border-radius: 1px;
    background: rgba(255, 255, 255, 0.72);
    opacity: 0.78;
    animation: floatTag var(--d) ease-in-out var(--dl) infinite alternate;
    transition: opacity 0.2s, box-shadow 0.2s;
  }
  .tag:hover { opacity: 1; box-shadow: 0 3px 12px rgba(0,0,0,0.09); }
  @keyframes floatTag { from{transform:translateY(0)} to{transform:translateY(-4px)} }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(8, 23, 46, 0.45);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal-panel {
    position: relative;
    background: rgba(255, 255, 255, 0.97);
    border: 1px solid var(--pborder);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 12px 48px rgba(14, 52, 110, 0.18), inset 0 1px 0 #fff;
    padding: 40px 44px 36px;
    max-width: 460px; width: 100%;
  }
  .modal-panel::before {
    content: ''; position: absolute;
    top: 0; left: 20px; right: 20px; height: 2px;
    background: var(--mc, var(--accent)); opacity: 0.55;
  }
  .mc-tl,.mc-tr,.mc-bl,.mc-br {
    position: absolute; width: 16px; height: 16px;
    border-color: var(--mc, var(--accent)); border-style: solid;
  }
  .mc-tl { top:0; left:0;   border-width: 2px 0 0 2px; }
  .mc-tr { top:0; right:0;  border-width: 2px 2px 0 0; }
  .mc-bl { bottom:0; left:0;  border-width: 0 0 2px 2px; }
  .mc-br { bottom:0; right:0; border-width: 0 2px 2px 0; }

  .modal-eyebrow {
    font-size: 0.58rem; letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--mc, var(--accent)); opacity: 0.75; margin-bottom: 12px;
  }
  .modal-heading {
    font-size: 1.25rem; font-weight: 700; letter-spacing: 0.03em;
    color: var(--text); margin-bottom: 14px; text-wrap: balance;
    word-break: auto-phrase;
  }
  .modal-heading[data-len="med"]  { font-size: 1.05rem; }
  .modal-heading[data-len="long"] { font-size: 0.88rem; }
  .modal-desc {
    font-size: 0.8rem; line-height: 1.95; color: var(--label); margin-bottom: 28px;
    white-space: pre-line;
  }
  .modal-actions { display: flex; }
  .modal-search-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 22px;
    background: transparent;
    color: var(--mc, var(--accent));
    border: 1px solid var(--mc, var(--accent));
    text-decoration: none;
    font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
    transition: background 0.2s, color 0.2s;
  }
  .modal-search-btn:hover {
    background: var(--mc, var(--accent));
    color: #fff;
  }
  .modal-search-btn:focus-visible { outline: 2px solid var(--mc, var(--accent)); outline-offset: 2px; }
  .modal-search-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .modal-close {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; cursor: pointer;
    font-size: 0.75rem; color: var(--dim); padding: 6px; line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-close:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ── Footer ── */
  .footer {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    font-size: 0.54rem; letter-spacing: 0.35em;
    color: var(--dim); opacity: 0.45; white-space: nowrap; pointer-events: none;
  }

  @media (prefers-reduced-motion: reduce) {
    .tag { animation: none; }
    #cursor { animation: none; }
  }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="hud">
  <div class="clock" aria-live="polite" aria-atomic="true">
    <div id="clock-time">00:00:00</div>
    <div id="clock-date">----.--.--</div>
  </div>

  <div class="name-frame" role="heading" aria-level="1" aria-label="User identity">
    <div class="c-tl"></div><div class="c-tr"></div>
    <div class="c-bl"></div><div class="c-br"></div>
    <div class="sys-label">◈ USER ELEMENT</div>
    <div id="name-wrap">
      <span id="name-text" aria-live="polite" aria-atomic="true"></span>
      <span id="cursor" aria-hidden="true"></span>
    </div>
    <div class="frame-status"><span></span>ACCESS GRANTED<span></span></div>
  </div>

  <nav class="links" aria-label="Profile links"></nav>

  <div class="identities" role="list" aria-label="Identities"></div>
</div>

<div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
  <div class="modal-panel" id="modal-panel">
    <div class="mc-tl"></div><div class="mc-tr"></div>
    <div class="mc-bl"></div><div class="mc-br"></div>
    <button class="modal-close" id="modal-close-btn" aria-label="閉じる">✕</button>
    <div class="modal-eyebrow">◈ ELEMENT</div>
    <h2 class="modal-heading" id="modal-heading"></h2>
    <p class="modal-desc" id="modal-desc"></p>
    <div class="modal-actions">
      <a class="modal-search-btn" id="modal-search-btn" href="#" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <path d="m21 21-4.35-4.35" stroke-linecap="round"/>
        </svg>
        ブラウザで検索
      </a>
    </div>
  </div>
</div>

<div class="footer">SYSTEM ONLINE ──── ACCESS GRANTED</div>

<script>
(function () {
  'use strict';

  // ── Style maps (UI concern — edit index.html to change appearance)
  var NAME_GRADIENTS = [
    ['#1258c8','#00b4d8'],
    ['#8b2de8','#e82d78'],
    ['#e87800','#e8c800'],
    ['#0ea86a','#1258c8'],
    ['#e82d78','#8b2de8'],
    ['#1258c8','#8b2de8'],
    ['#e87800','#0ea86a'],
  ];

  var LINK_STYLES = {
    github: { border:'rgba(10,150,72,0.40)',  icon:'#0a9648', hoverBg:'rgba(10,150,72,0.06)',  hoverSh:'rgba(10,150,72,0.18)'  },
    qiita:  { border:'rgba(0,120,175,0.40)',  icon:'#0078af', hoverBg:'rgba(0,120,175,0.06)',  hoverSh:'rgba(0,120,175,0.18)'  },
    potofu: { border:'rgba(185,0,90,0.40)',   icon:'#b9005a', hoverBg:'rgba(185,0,90,0.06)',   hoverSh:'rgba(185,0,90,0.18)'   },
  };

  var LINK_ICONS = {
    github: '<path fill="currentColor" d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.49.5.09.682-.218.682-.482 0-.237-.009-.868-.014-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.004.07 1.532 1.032 1.532 1.032.892 1.53 2.341 1.088 2.91.832.091-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.748-1.025 2.748-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>',
    qiita:  '<circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 8v4l2.5 2.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
    potofu: '<circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
  };

  var ACCENTS = ['#1258c8','#0099cc','#8b2de8','#d42060','#d46000','#0a9648'];

  // ── Clock (starts immediately)
  var clockTime = document.getElementById('clock-time');
  var clockDate  = document.getElementById('clock-date');
  function tickClock() {
    var n = new Date(), p = function(v){ return String(v).padStart(2,'0'); };
    clockTime.textContent = p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
    clockDate.textContent  = n.getFullYear()+'.'+p(n.getMonth()+1)+'.'+p(n.getDate());
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ── Identities renderer
  function initIdentities(identities) {
    var el = document.querySelector('.identities');
    identities.forEach(function(item, i) {
      var tag = document.createElement('div');
      tag.className = 'tag';
      tag.setAttribute('role', 'listitem');
      tag.textContent = item.label;
      tag.style.setProperty('--d',  (3.8 + i * 0.45) + 's');
      tag.style.setProperty('--dl', (i * 0.28) + 's');
      tag.style.borderColor = item.color + '60';
      tag.style.color = item.color;
      tag.style.cursor = 'pointer';
      tag.addEventListener('click', (function(i) {
        return function() { openModal(i); };
      })(item));
      el.appendChild(tag);
    });
  }

  // ── Modal
  function openModal(item) {
    var panel = document.getElementById('modal-panel');
    var headingEl = document.getElementById('modal-heading');
    var headingText = item.heading || item.label;
    headingEl.textContent = headingText;
    headingEl.dataset.len = headingText.length > 22 ? 'long' : headingText.length > 14 ? 'med' : '';
    document.getElementById('modal-desc').textContent    = item.description || '';
    var sw = item['search-word'];
    var actionsEl = document.querySelector('.modal-actions');
    if (sw) {
      document.getElementById('modal-search-btn').href =
        'https://www.google.com/search?q=' + encodeURIComponent(sw);
      actionsEl.style.display = '';
    } else {
      actionsEl.style.display = 'none';
    }
    panel.style.setProperty('--mc', item.color);
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-close-btn').focus();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  document.querySelector('.name-frame').addEventListener('click', function() {
    if (IDENTITIES.length) openModal(IDENTITIES[nameIdx]);
  });

  // ── Links renderer
  function initLinks(links) {
    var nav = document.querySelector('.links');
    links.forEach(function(link) {
      var s = LINK_STYLES[link.type] || {
        border: 'rgba(18,88,200,0.4)', icon: '#1258c8',
        hoverBg: 'rgba(18,88,200,0.06)', hoverSh: 'rgba(18,88,200,0.18)'
      };
      var icon = LINK_ICONS[link.type] || '';
      var a = document.createElement('a');
      a.className = 'lbtn';
      a.href = link.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.style.borderColor = s.border;
      a.innerHTML =
        '<svg viewBox="0 0 24 24" aria-hidden="true" style="width:14px;height:14px;flex-shrink:0;color:' + s.icon + '">' +
        icon + '</svg>' + link.label;
      a.addEventListener('mouseenter', function() {
        a.style.background  = s.hoverBg;
        a.style.boxShadow   = '0 4px 18px ' + s.hoverSh;
      });
      a.addEventListener('mouseleave', function() {
        a.style.background  = 'rgba(255,255,255,0.82)';
        a.style.boxShadow   = '0 2px 8px rgba(14,52,110,0.07)';
      });
      nav.appendChild(a);
    });
  }

  // ── Identity animation
  var nameEl     = document.getElementById('name-text');
  var cursorEl   = document.getElementById('cursor');
  var IDENTITIES = [];
  var nameIdx    = 0;

  function applyGradient(idx) {
    var item = IDENTITIES[idx];
    var c1   = (item && item.color) ? item.color : '#1258c8';
    var c2   = NAME_GRADIENTS[idx % NAME_GRADIENTS.length][1];
    nameEl.style.background = 'linear-gradient(135deg,' + c1 + ',' + c2 + ')';
    nameEl.style.webkitBackgroundClip = 'text';
    nameEl.style.backgroundClip = 'text';
    nameEl.style.webkitTextFillColor = 'transparent';
    nameEl.style.color = 'transparent';
    cursorEl.style.background = 'linear-gradient(180deg,' + c1 + ',' + c2 + ')';
  }

  function isJapanese(str) { return /[぀-ヿ一-鿿]/.test(str); }

  function glitchPool(str) {
    return isJapanese(str)
      ? 'ヲアイウエオカキクケコサシスセソタチナニハヒフヘホ▓░◈'
      : '▓▒░█▄▀■□◈◊#@$%!?';
  }

  function typeIn(str, done) {
    nameEl.textContent = ''; var i = 0;
    function step() {
      nameEl.textContent = str.slice(0, ++i);
      if (i < str.length) setTimeout(step, 72 + Math.random() * 44);
      else setTimeout(done, 2500);
    }
    step();
  }

  function glitchOut(str, done) {
    var pool = glitchPool(str), s = 0, total = 7;
    function scramble() {
      nameEl.textContent = str.split('').map(function(c, i) {
        return s / total > i / str.length ? '' : pool[Math.floor(Math.random() * pool.length)];
      }).join('');
      s++;
      if (s <= total) setTimeout(scramble, 52);
      else { nameEl.textContent = ''; done(); }
    }
    scramble();
  }

  function pickNext() {
    var n; do { n = Math.floor(Math.random() * IDENTITIES.length); } while (n === nameIdx); return n;
  }

  function cycle() {
    var label = IDENTITIES[nameIdx].label;
    applyGradient(nameIdx);
    typeIn(label, function() {
      glitchOut(label, function() {
        nameIdx = pickNext(); setTimeout(cycle, 160);
      });
    });
  }

  // ── Data loading
  function parseJsonl(text) {
    return text.trim().split('\n')
      .map(function(l) { return l.trim(); })
      .filter(Boolean)
      .map(JSON.parse);
  }

  Promise.all([
    fetch('./profile.json').then(function(r) { return r.json(); }),
    fetch('./links.jsonl').then(function(r) { return r.text(); }).then(parseJsonl)
  ]).then(function(results) {
    var profile = results[0], links = results[1];
    IDENTITIES = profile.identities || [];
    initIdentities(IDENTITIES);
    initLinks(links);
    if (IDENTITIES.length) {
      nameIdx = Math.floor(Math.random() * IDENTITIES.length);
      cycle();
    }
  }).catch(function(err) {
    console.error('[portal] data load failed:', err);
  });

  // ── Background canvas (starts immediately)
  var canvas = document.getElementById('bg');
  var ctx    = canvas.getContext('2d');
  var CONN   = 120;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  var SHAPES = ['circle', 'hex', 'diamond'];

  function makeNode(init) {
    return {
      x:     init ? Math.random() * canvas.width  : (Math.random() < .5 ? -24 : canvas.width + 24),
      y:     init ? Math.random() * canvas.height : Math.random() * canvas.height,
      vx:    (Math.random() - .5) * 0.25,
      vy:    (Math.random() - .5) * 0.25,
      r:     3 + Math.random() * 5.5,
      color: ACCENTS[Math.floor(Math.random() * ACCENTS.length)],
      shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
      alpha: 0.18 + Math.random() * 0.30,
      angle: Math.random() * Math.PI * 2,
      spin:  (Math.random() - .5) * 0.007
    };
  }

  var nodes = [];
  for (var i = 0; i < 48; i++) nodes.push(makeNode(true));

  function drawNode(n) {
    ctx.save();
    ctx.translate(n.x, n.y); ctx.rotate(n.angle);
    ctx.globalAlpha = n.alpha;
    ctx.strokeStyle = n.color;
    ctx.fillStyle   = n.color + '18';
    ctx.lineWidth   = 1; ctx.shadowBlur = 0;
    ctx.beginPath();
    if (n.shape === 'circle') {
      ctx.arc(0, 0, n.r, 0, Math.PI * 2);
    } else if (n.shape === 'hex') {
      for (var k = 0; k < 6; k++) {
        var a = (k / 6) * Math.PI * 2 - Math.PI / 2;
        ctx[k ? 'lineTo' : 'moveTo'](Math.cos(a) * n.r, Math.sin(a) * n.r);
      }
      ctx.closePath();
    } else {
      ctx.moveTo(0, -n.r); ctx.lineTo(n.r, 0); ctx.lineTo(0, n.r); ctx.lineTo(-n.r, 0); ctx.closePath();
    }
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  function drawLinks() {
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i + 1; j < nodes.length; j++) {
        var dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        var d  = Math.sqrt(dx * dx + dy * dy);
        if (d < CONN) {
          ctx.globalAlpha = (1 - d / CONN) * 0.18;
          ctx.strokeStyle = '#7090b8';
          ctx.lineWidth   = 0.5; ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
    }
  }

  function drawGrid() {
    ctx.globalAlpha = 0.08; ctx.strokeStyle = '#6890c0'; ctx.lineWidth = 0.5;
    var g = 72;
    for (var x = 0; x <= canvas.width; x += g) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (var y = 0; y <= canvas.height; y += g) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
  }

  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    ctx.globalAlpha = 1;
    drawLinks();
    nodes.forEach(function(n) {
      n.x += n.vx; n.y += n.vy; n.angle += n.spin;
      if (n.x < -60 || n.x > canvas.width + 60 || n.y < -60 || n.y > canvas.height + 60) {
        var f = makeNode(false); Object.assign(n, f);
      }
      drawNode(n);
    });
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
